<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>F5F6 PSP Dashboard</title>

    <!-- THUMBNAIL PREVIEW -->
    <meta property="og:title" content="F5F6 Dashboard">
    <meta property="og:description" content="PT Pupuk Sriwidjaja Palembang">
    <meta property="og:image" content="https://raw.githubusercontent.com/pspamirhamzah/f5f6-psp/main/public/thumbnail.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/pspamirhamzah/f5f6-psp">  
    
    <!-- Scripts & Frameworks -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#23262e",
                        "surface-container-high": "#1d1f27",
                        "primary": "#85adff",
                        "on-background": "#e5e4ed",
                        "secondary": "#69f6b8",
                        "surface-dim": "#0c0e14",
                        "tertiary": "#ffb148",
                        "background": "#0c0e14",
                        "on-surface": "#e5e4ed",
                        "error-container": "#ff716c",
                        "label-dim": "#53555c"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0c0e14; color: #e5e4ed; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card {
            background: rgba(26, 29, 38, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .bezier-transition { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }
        
        .recharts-bar-rectangle path {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-background overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            ComposedChart, Bar, Cell, Line, XAxis, YAxis, 
            CartesianGrid, Tooltip, ResponsiveContainer 
        } = window.Recharts;

        const SUPABASE_URL = 'https://fvbtqtleshwbrhdwkgfo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2YnRxdGxlc2h3YnJoZHdrZ2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTI2NzcsImV4cCI6MjA5MTY4ODY3N30.dwd9WxTaEwYIAmTZJh7xT2qC3i0G4yU4lXy0OWHfaj8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const KeyIcon = ({ label, active }) => (
            <div className={`w-8 h-8 rounded-lg border flex items-center justify-center text-[11px] font-black transition-all duration-300 flex-shrink-0 ${active ? 'bg-primary/20 border-primary text-primary shadow-[0_0_15px_rgba(133,173,255,0.3)]' : 'bg-white/5 border-white/10 text-[#aaaab3]'}`}>
                {label}
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('F5');
            const [isCollapsed, setIsCollapsed] = useState(false);
            const [allData, setAllData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [loadProgress, setLoadProgress] = useState(0);
            const [activeIndex, setActiveIndex] = useState(null);

            // Filter States
            const [selectedTahun, setSelectedTahun] = useState('All');
            const [selectedProvinsi, setSelectedProvinsi] = useState('All');
            const [selectedKabupaten, setSelectedKabupaten] = useState('All');
            const [selectedProduk, setSelectedProduk] = useState('All');

            useEffect(() => {
                const fetchParallel = async () => {
                    setIsLoading(true);
                    setLoadProgress(5); // Start progress
                    
                    try {
                        // 1. Get total count first
                        const { count, error: countError } = await supabaseClient
                            .from('F5F6')
                            .select('*', { count: 'exact', head: true });

                        if (countError) throw countError;
                        if (!count) {
                            setIsLoading(false);
                            return;
                        }

                        // 2. Setup parallel requests (1000 records per chunk)
                        const chunkSize = 1000;
                        const totalChunks = Math.ceil(count / chunkSize);
                        const promises = [];

                        // Optimizing columns to reduce payload size
                        const columns = 'tipe_dokumen,tahun,provinsi,kabupaten,distributor,produk,penebusan,penyaluran,stok_awal,stok_akhir,bulan';

                        let completedChunks = 0;

                        for (let i = 0; i < totalChunks; i++) {
                            const promise = supabaseClient
                                .from('F5F6')
                                .select(columns)
                                .range(i * chunkSize, (i * chunkSize) + (chunkSize - 1))
                                .then(result => {
                                    completedChunks++;
                                    // Update progress based on completed chunks
                                    const progress = Math.min(Math.round((completedChunks / totalChunks) * 100), 100);
                                    setLoadProgress(progress);
                                    return result.data;
                                });
                            promises.push(promise);
                        }

                        // 3. Execute all requests in parallel
                        const results = await Promise.all(promises);
                        const combinedData = results.flat();

                        setAllData(combinedData);
                        
                        if (combinedData.length > 0) {
                            const years = [...new Set(combinedData.map(d => String(d.tahun)))].sort((a,b) => b-a);
                            setSelectedTahun(years[0]);
                        }
                        
                        setTimeout(() => setIsLoading(false), 300);
                    } catch (err) {
                        console.error("Critical Fetch Error:", err);
                        setIsLoading(false);
                    }
                };

                fetchParallel();
            }, []);

            const parseNum = (val) => parseFloat(val) || 0;
            const formatNumber = (num) => new Intl.NumberFormat('id-ID').format(Math.round(num));

            const filterOptions = useMemo(() => {
                const data = allData.filter(r => r.tipe_dokumen === activeTab);
                return {
                    tahun: [...new Set(data.map(d => String(d.tahun)))].sort((a, b) => b - a),
                    provinsi: [...new Set(data.map(d => d.provinsi))].sort(),
                    produk: [...new Set(data.map(d => d.produk))].sort()
                };
            }, [allData, activeTab]);

            const kabupatenOptions = useMemo(() => {
                const data = allData.filter(r => r.tipe_dokumen === activeTab);
                const filtered = selectedProvinsi === 'All' ? data : data.filter(r => r.provinsi === selectedProvinsi);
                return [...new Set(filtered.map(d => d.kabupaten))].sort();
            }, [allData, activeTab, selectedProvinsi]);

            const filteredData = useMemo(() => {
                return allData.filter(row => {
                    const matchType = row.tipe_dokumen === activeTab;
                    const matchYear = selectedTahun === 'All' || String(row.tahun) === selectedTahun;
                    const matchProv = selectedProvinsi === 'All' || row.provinsi === selectedProvinsi;
                    const matchKab = selectedKabupaten === 'All' || row.kabupaten === selectedKabupaten;
                    const matchProd = selectedProduk === 'All' || row.produk === selectedProduk;
                    return matchType && matchYear && matchProv && matchKab && matchProd;
                });
            }, [allData, activeTab, selectedTahun, selectedProvinsi, selectedKabupaten, selectedProduk]);

            const stats = useMemo(() => {
                const calculateMetrics = (data) => {
                    let sAwal = 0; let pnb = 0; let pnl = 0; let sAkhir = 0;
                    const entitas = {};
                    data.forEach(row => {
                        pnb += parseNum(row.penebusan);
                        pnl += parseNum(row.penyaluran);
                        const key = `${row.provinsi}_${row.kabupaten}_${row.distributor}_${row.produk}`;
                        const b = parseInt(row.bulan) || 0;
                        if (!entitas[key]) {
                            entitas[key] = { minB: b, maxB: b, sA: parseNum(row.stok_awal), sE: parseNum(row.stok_akhir) };
                        } else {
                            if (b < entitas[key].minB) { entitas[key].minB = b; entitas[key].sA = parseNum(row.stok_awal); }
                            if (b > entitas[key].maxB) { entitas[key].maxB = b; entitas[key].sE = parseNum(row.stok_akhir); }
                        }
                    });
                    Object.values(entitas).forEach(e => { sAwal += e.sA; sAkhir += e.sE; });
                    return { sAwal, pnb, pnl, sAkhir };
                };

                const current = calculateMetrics(filteredData);
                const lastYearValue = parseInt(selectedTahun) - 1;
                const lastYearData = allData.filter(row => {
                    return row.tipe_dokumen === activeTab &&
                           String(row.tahun) === String(lastYearValue) &&
                           (selectedProvinsi === 'All' || row.provinsi === selectedProvinsi) &&
                           (selectedKabupaten === 'All' || row.kabupaten === selectedKabupaten) &&
                           (selectedProduk === 'All' || row.produk === selectedProduk);
                });
                const last = calculateMetrics(lastYearData);

                const getGrowth = (curr, prev) => {
                    if (prev === 0) return curr > 0 ? 100 : 0;
                    return ((curr - prev) / prev) * 100;
                };

                return {
                    ...current,
                    ratio: current.pnb > 0 ? (current.pnl/current.pnb).toFixed(2) : "0.00",
                    yoy: {
                        sAwal: getGrowth(current.sAwal, last.sAwal),
                        pnb: getGrowth(current.pnb, last.pnb),
                        pnl: getGrowth(current.pnl, last.pnl),
                        sAkhir: getGrowth(current.sAkhir, last.sAkhir)
                    }
                };
            }, [filteredData, allData, selectedTahun, activeTab, selectedProvinsi, selectedKabupaten, selectedProduk]);

            const chartData = useMemo(() => {
                const months = {};
                filteredData.forEach(row => {
                    const b = parseInt(row.bulan);
                    if (b >= 1 && b <= 12) {
                        if (!months[b]) months[b] = { b, name: ["JAN", "FEB", "MAR", "APR", "MEI", "JUN", "JUL", "AGU", "SEP", "OKT", "NOV", "DES"][b-1], Penebusan: 0, Penyaluran: 0 };
                        months[b].Penebusan += parseNum(row.penebusan);
                        months[b].Penyaluran += parseNum(row.penyaluran);
                    }
                });
                return Object.values(months).sort((a,b) => a.b - b.b);
            }, [filteredData]);

            const drillDownGroup = useMemo(() => {
                let key = 'provinsi';
                let label = 'Provinsi';
                if (selectedProvinsi !== 'All') {
                    key = 'kabupaten';
                    label = 'Kabupaten';
                }
                if (selectedKabupaten !== 'All') {
                    key = 'distributor';
                    label = 'Distributor';
                }
                return { key, label };
            }, [selectedProvinsi, selectedKabupaten]);

            const comparisonData = useMemo(() => {
                const groups = {};
                filteredData.forEach(row => {
                    const name = row[drillDownGroup.key] || 'Tidak Diketahui';
                    if (!groups[name]) groups[name] = { name, pnb: 0, pnl: 0 };
                    groups[name].pnb += parseNum(row.penebusan);
                    groups[name].pnl += parseNum(row.penyaluran);
                });
                return Object.values(groups).sort((a,b) => b.pnl - a.pnl).slice(0, 5);
            }, [filteredData, drillDownGroup]);

            const tableData = useMemo(() => {
                const groups = {};
                filteredData.forEach(row => {
                    const groupName = row[drillDownGroup.key] || 'Tidak Diketahui';
                    if (!groups[groupName]) {
                        groups[groupName] = { 
                            name: groupName, 
                            entities: {}, 
                            pnb: 0, 
                            pnl: 0 
                        };
                    }
                    
                    const g = groups[groupName];
                    g.pnb += parseNum(row.penebusan);
                    g.pnl += parseNum(row.penyaluran);
                    
                    const entityKey = `${row.provinsi}_${row.kabupaten}_${row.distributor}_${row.produk}`;
                    const b = parseInt(row.bulan) || 0;
                    if (!g.entities[entityKey]) {
                        g.entities[entityKey] = { minB: b, maxB: b, sA: parseNum(row.stok_awal), sE: parseNum(row.stok_akhir) };
                    } else {
                        if (b < g.entities[entityKey].minB) {
                            g.entities[entityKey].minB = b;
                            g.entities[entityKey].sA = parseNum(row.stok_awal);
                        }
                        if (b > g.entities[entityKey].maxB) {
                            g.entities[entityKey].maxB = b;
                            g.entities[entityKey].sE = parseNum(row.stok_akhir);
                        }
                    }
                });

                return Object.values(groups).map(g => {
                    let totalSA = 0;
                    let totalSE = 0;
                    Object.values(g.entities).forEach(e => {
                        totalSA += e.sA;
                        totalSE += e.sE;
                    });
                    return {
                        name: g.name,
                        sAwal: totalSA,
                        pnb: g.pnb,
                        pnl: g.pnl,
                        sAkhir: totalSE
                    };
                }).sort((a,b) => b.pnl - a.pnl);
            }, [filteredData, drillDownGroup]);

            const RankIndicator = ({ index }) => {
                if (index === 0) return <span className="material-symbols-outlined text-[#FFD700] text-xl select-none" style={{fontVariationSettings: "'FILL' 1"}}>workspace_premium</span>;
                if (index === 1) return <span className="material-symbols-outlined text-[#C0C0C0] text-xl select-none" style={{fontVariationSettings: "'FILL' 1"}}>workspace_premium</span>;
                if (index === 2) return <span className="material-symbols-outlined text-[#CD7F32] text-xl select-none" style={{fontVariationSettings: "'FILL' 1"}}>workspace_premium</span>;
                return <span className="text-[10px] font-bold text-label-dim w-5 text-center select-none">{index + 1}</span>;
            };

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* LOADING OVERLAY - Professional Refined Style */}
                    {isLoading && (
                        <div className="fixed inset-0 z-[100] bg-[#0c0e14] flex flex-col items-center justify-center">
                            <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#85adff] to-[#6e9fff] flex items-center justify-center shadow-2xl shadow-primary/10 mb-10 animate-pulse-soft">
                                <span className="material-symbols-outlined text-[#002c66] text-2xl" style={{fontVariationSettings: "'FILL' 1"}}>database</span>
                            </div>
                            <div className="text-center space-y-6 px-6">
                                <h2 className="text-lg font-normal text-on-background/80 tracking-normal">Menghubungkan database...</h2>
                                <div className="w-64 h-1 bg-white/5 rounded-full overflow-hidden mx-auto">
                                    <div 
                                        className="h-full bg-primary transition-all duration-700 ease-in-out" 
                                        style={{ width: `${loadProgress}%` }}
                                    ></div>
                                </div>
                                <div className="flex flex-col items-center gap-3">
                                    <p className="text-[14px] text-primary/80 font-normal tracking-tight">Sinkronisasi {loadProgress}%</p>
                                    <p className="text-[13px] text-label-dim font-normal tracking-wide italic leading-relaxed">
                                        Iwak Sepat Iwak Gabus, Makin Cepat Makin Bagus!
                                    </p>
                                </div>
                            </div>
                        </div>
                    )}

                    <aside className={`fixed left-0 top-0 h-screen z-50 bg-[#11131a] flex flex-col py-6 px-4 shadow-[40px_0_60px_-15px_rgba(0,0,0,0.5)] bezier-transition ${isCollapsed ? 'w-[80px]' : 'w-[240px]'}`}>
                        <div className={`mb-10 flex items-center ${isCollapsed ? 'justify-center' : 'px-2 gap-3'}`}>
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#85adff] to-[#6e9fff] flex-shrink-0 flex items-center justify-center shadow-lg shadow-primary/20">
                                <span className="material-symbols-outlined text-[#002c66]" style={{fontVariationSettings: "'FILL' 1"}}>insights</span>
                            </div>
                            {!isCollapsed && (
                                <div className="overflow-hidden whitespace-nowrap">
                                    <h1 className="text-xl font-black text-on-background tracking-tight leading-none">F5F6</h1>
                                    <p className="text-[10px] text-primary font-bold tracking-[0.2em] uppercase mt-1">DATABASE</p>
                                </div>
                            )}
                        </div>
                        <nav className="flex-1 space-y-2">
                            {['F5', 'F6'].map(tab => (
                                <button key={tab} onClick={() => {setActiveTab(tab); setSelectedProvinsi('All'); setSelectedKabupaten('All');}} className={`w-full flex items-center rounded-xl bezier-transition ${isCollapsed ? 'justify-center p-3' : 'px-4 py-3 gap-3'} ${activeTab === tab ? 'bg-[#1d1f27] text-primary border-r-2 border-primary shadow-lg shadow-black/20' : 'text-[#aaaab3] hover:text-white hover:bg-white/5'}`}>
                                    <KeyIcon label={tab} active={activeTab === tab} />
                                    {!isCollapsed && <span className="font-semibold text-sm">Laporan {tab}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto border-t border-white/5 pt-4">
                            <button onClick={() => setIsCollapsed(!isCollapsed)} className={`w-full flex items-center bg-white/5 rounded-xl text-[#aaaab3] hover:text-white transition-all ${isCollapsed ? 'justify-center p-3' : 'px-4 py-3 gap-3'}`}>
                                <span className="material-symbols-outlined">{isCollapsed ? 'last_page' : 'first_page'}</span>
                                {!isCollapsed && <span className="text-xs font-bold uppercase tracking-widest">Kecilkan</span>}
                            </button>
                        </div>
                    </aside>

                    <main className={`flex flex-col h-full bezier-transition ${isCollapsed ? 'ml-[80px] w-[calc(100%-80px)]' : 'ml-[240px] w-[calc(100%-240px)]'}`}>
                        <header className="h-16 flex items-center px-8 border-b border-white/5 bg-background/50 backdrop-blur-md sticky top-0 z-40">
                            <div className="flex items-center gap-2 text-xs font-medium text-on-surface-variant">
                                <span>Analytics</span>
                                <span className="material-symbols-outlined text-sm">chevron_right</span>
                                <span className="text-on-surface font-bold">Dashboard {activeTab}</span>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 hide-scrollbar">
                            <section className="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                                <FilterSelect label="Tahun" value={selectedTahun} onChange={setSelectedTahun} options={filterOptions.tahun} showAll />
                                <FilterSelect label="Provinsi" value={selectedProvinsi} onChange={setSelectedProvinsi} options={filterOptions.provinsi} showAll />
                                <FilterSelect label="Kabupaten" value={selectedKabupaten} onChange={setSelectedKabupaten} options={kabupatenOptions} showAll />
                                <FilterSelect label="Produk" value={selectedProduk} onChange={setSelectedProduk} options={filterOptions.produk} showAll />
                            </section>

                            <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                <KPICard label="Stok Awal" val={stats.sAwal} icon="inventory_2" color="text-primary" compareVal={stats.yoy.sAwal} />
                                <KPICard label="Penebusan" val={stats.pnb} icon="payments" color="text-primary" compareVal={stats.yoy.pnb} />
                                <KPICard label="Penyaluran" val={stats.pnl} icon="local_shipping" color="text-secondary" compareVal={stats.yoy.pnl} />
                                <KPICard label="Stok Akhir" val={stats.sAkhir} icon="warehouse" color="text-tertiary" compareVal={stats.yoy.sAkhir} />
                            </section>

                            <section className="grid grid-cols-12 gap-8 mb-8">
                                <div className="col-span-12 lg:col-span-8 glass-card p-8 rounded-3xl flex flex-col min-h-[460px]">
                                    <div className="flex justify-between items-start mb-10">
                                        <div>
                                            <h2 className="text-lg font-bold text-on-surface uppercase tracking-tight">Tren {selectedTahun === 'All' ? 'Tahunan' : selectedTahun}</h2>
                                            <p className="text-[10px] text-label-dim uppercase font-bold tracking-widest">Analisis Perbandingan Data</p>
                                        </div>
                                        <div className="flex gap-4">
                                            <LegendItem color="bg-primary" label="Penebusan" />
                                            <LegendItem color="bg-white/10" label="Penyaluran" />
                                        </div>
                                    </div>
                                    <div className="flex-1 w-full h-[320px]">
                                        {chartData.length > 0 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <ComposedChart data={chartData} onMouseMove={(s) => s.activeTooltipIndex !== undefined && setActiveIndex(s.activeTooltipIndex)} onMouseLeave={() => setActiveIndex(null)}>
                                                    <defs>
                                                        <linearGradient id="activeBarGrad" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="0%" stopColor="#fff" stopOpacity={0.2}/>
                                                            <stop offset="100%" stopColor="#fff" stopOpacity={0.05}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="0" vertical={false} stroke="rgba(255,255,255,0.02)" />
                                                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#666', fontWeight: 700}} dy={15} />
                                                    <YAxis hide />
                                                    <Tooltip cursor={false} content={<CustomTooltip />} />
                                                    
                                                    <Bar dataKey="Penyaluran" radius={[8, 8, 0, 0]} maxBarSize={45}>
                                                        {chartData.map((e, i) => (
                                                            <Cell 
                                                                key={i} 
                                                                fill={i === activeIndex ? "url(#activeBarGrad)" : "rgba(255,255,255,0.04)"} 
                                                                stroke={i === activeIndex ? "rgba(255,255,255,0.2)" : "transparent"} 
                                                                strokeWidth={i === activeIndex ? 1 : 0} 
                                                                className="bezier-transition" 
                                                            />
                                                        ))}
                                                    </Bar>

                                                    <Line 
                                                        type="monotone" 
                                                        dataKey="Penebusan" 
                                                        stroke="#85adff" 
                                                        strokeWidth={4} 
                                                        dot={false} 
                                                        activeDot={{ r: 6, fill: '#fff', stroke: '#85adff', strokeWidth: 3 }}
                                                        style={{ filter: 'drop-shadow(0px 4px 10px rgba(133, 173, 255, 0.5))' }}
                                                        connectNulls={true}
                                                    />
                                                </ComposedChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex flex-col items-center justify-center text-on-surface-variant">
                                                <span className="material-symbols-outlined text-4xl mb-2 opacity-20">bar_chart_off</span>
                                                <p className="text-[10px] font-bold uppercase tracking-widest">Tidak ada data</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="col-span-12 lg:col-span-4 glass-card p-8 rounded-3xl flex flex-col min-h-[460px]">
                                    <h2 className="text-lg font-bold text-on-surface mb-6 uppercase tracking-tight">Ratio Efektivitas</h2>
                                    <p className="text-[10px] text-label-dim font-bold uppercase mb-4 tracking-widest">Berdasarkan Alokasi Terbesar</p>
                                    <div className="flex-1 space-y-6 overflow-y-auto pr-2 custom-scrollbar">
                                        {comparisonData.map((d, i) => (
                                            <div key={i} className="space-y-2">
                                                <div className="flex justify-between items-center">
                                                    <div className="flex items-center gap-3 truncate pr-4">
                                                        <RankIndicator index={i} />
                                                        <span className="text-[10px] font-bold uppercase text-on-surface-variant truncate">{d.name}</span>
                                                    </div>
                                                    <span className="text-primary text-[10px] font-black">{((d.pnl/d.pnb)*100 || 0).toFixed(0)}%</span>
                                                </div>
                                                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden ml-8 lg:ml-0"><div className="h-full bg-primary" style={{width: `${Math.min((d.pnl/d.pnb)*100, 100)}%`}}></div></div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                                        <div className="text-center"><p className="text-[9px] text-on-surface-variant font-bold uppercase tracking-widest">Ratio Rata-rata</p><p className="text-xl font-black text-primary">{stats.ratio}</p></div>
                                        <div className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest ${parseFloat(stats.ratio) >= 0.8 ? 'bg-secondary/10 text-secondary' : 'bg-tertiary/10 text-tertiary'}`}>{parseFloat(stats.ratio) >= 0.8 ? 'Optimal' : 'Monitoring'}</div>
                                    </div>
                                </div>
                            </section>

                            <section className="glass-card rounded-3xl overflow-hidden mb-12">
                                <div className="p-8 flex justify-between items-center border-b border-white/5 bg-white/[0.01]">
                                    <div>
                                        <h2 className="text-lg font-bold text-on-surface uppercase tracking-tight">Rincian Penyaluran</h2>
                                        <p className="text-[10px] text-label-dim font-bold uppercase mt-1 tracking-widest">Berdasarkan Alokasi Terbesar</p>
                                    </div>
                                    <span className="text-[10px] font-bold text-primary uppercase bg-primary/10 px-3 py-1 rounded-full whitespace-nowrap">
                                        {tableData.length} {drillDownGroup.label}
                                    </span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="bg-white/[0.02] text-[10px] font-black uppercase tracking-widest text-on-surface-variant">
                                                <th className="py-5 px-6 w-16 text-center">Rank</th>
                                                <th className="py-5 px-4">{drillDownGroup.label}</th>
                                                <th className="py-5 px-6 text-right">Stok Awal</th>
                                                <th className="py-5 px-6 text-right">Penebusan</th>
                                                <th className="py-5 px-6 text-right">Penyaluran</th>
                                                <th className="py-5 px-8 text-right">Stok Akhir</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-xs divide-y divide-white/[0.03]">
                                            {tableData.map((row, i) => (
                                                <tr key={i} className="hover:bg-white/[0.02] bezier-transition group">
                                                    <td className="py-4 px-6 text-center">
                                                        <div className="flex justify-center items-center h-full">
                                                            <RankIndicator index={i} />
                                                        </div>
                                                    </td>
                                                    <td className="py-4 px-4">
                                                        <p className="font-bold group-hover:text-primary transition-colors uppercase tracking-tight">{row.name}</p>
                                                        {drillDownGroup.key === 'kabupaten' && <p className="text-[9px] text-on-surface-variant uppercase font-medium">{selectedProvinsi}</p>}
                                                    </td>
                                                    <td className="py-4 px-6 text-right text-on-surface/50 font-medium">{formatNumber(row.sAwal)}</td>
                                                    <td className="py-4 px-6 text-right text-on-surface/50 font-medium">{formatNumber(row.pnb)}</td>
                                                    <td className="py-4 px-6 text-right text-primary font-black">{formatNumber(row.pnl)}</td>
                                                    <td className="py-4 px-8 text-right font-black opacity-80">{formatNumber(row.sAkhir)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>

                            <footer className="mt-8 pb-12 text-center space-y-1 select-none">
                                <p className="text-[11px] text-label-dim tracking-tight font-normal leading-relaxed">
                                    Copyright © 2026 - Adm Pemasaran & Penjualan
                                </p>
                                <p className="text-[11px] text-label-dim tracking-tight font-normal leading-relaxed">
                                    Design by 00.0034
                                </p>
                            </footer>
                        </div>
                    </main>
                </div>
            );
        };

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="glass-card px-4 py-3 rounded-2xl border border-primary/20 shadow-2xl">
                        <p className="text-[10px] font-black text-primary uppercase tracking-[0.2em] mb-2">{label}</p>
                        <div className="space-y-1">
                            {payload.map((p, idx) => (
                                <div key={idx} className="flex justify-between gap-8 items-center">
                                    <span className="text-[9px] font-bold text-on-surface-variant uppercase">{p.name}</span>
                                    <span className="text-xs font-black text-on-surface">{new Intl.NumberFormat('id-ID').format(p.value)} TON</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
            return null;
        };

        const FilterSelect = ({ label, value, onChange, options, showAll }) => (
            <div className="space-y-1.5">
                <label className="text-[10px] font-bold text-label-dim uppercase tracking-widest px-1">{label}</label>
                <div className="relative group">
                    <select value={value} onChange={e => onChange(e.target.value)} className="w-full bg-surface-container-high border-none rounded-xl text-xs py-2.5 px-4 appearance-none focus:ring-1 focus:ring-primary/40 text-on-surface transition-all">
                        {showAll && <option value="All">SEMUA {label.toUpperCase()}</option>}
                        {options.map((opt, i) => <option key={i} value={typeof opt === 'object' ? opt.val : opt}>{String(typeof opt === 'object' ? opt.label : opt).toUpperCase()}</option>)}
                    </select>
                    <span className="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-sm">expand_more</span>
                </div>
            </div>
        );

        const KPICard = ({ label, val, icon, color, compareVal }) => {
            const isNegative = compareVal < 0;
            const absVal = Math.abs(compareVal);
            const trendColor = isNegative ? 'text-error-container' : 'text-secondary';
            const trendIcon = isNegative ? 'trending_down' : 'trending_up';
            
            return (
                <div className="glass-card p-6 rounded-3xl relative flex flex-col bezier-transition group hover:scale-[1.02] shadow-xl">
                    <div className="flex justify-between items-start mb-6">
                        <div className="p-3 rounded-2xl bg-white/[0.04] text-on-surface-variant group-hover:bg-primary/10 group-hover:text-primary transition-all shadow-inner">
                            <span className="material-symbols-outlined text-2xl">{icon}</span>
                        </div>
                        <div className="px-3 py-1 rounded-full bg-white/[0.03] text-[9px] font-black text-on-surface-variant uppercase tracking-widest border border-white/5">
                            TON
                        </div>
                    </div>
                    
                    <div className="mb-6">
                        <p className="text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">{label}</p>
                        <h3 className="text-4xl font-black tracking-tighter text-on-background">
                            {new Intl.NumberFormat('id-ID').format(val)}
                        </h3>
                    </div>

                    <div className="mt-auto flex items-center gap-2">
                        <div className={`flex items-center gap-1.5 px-2 py-1 rounded-lg ${isNegative ? 'bg-error-container/10' : 'bg-secondary/10'} ${trendColor}`}>
                            <span className="material-symbols-outlined text-base font-bold">{trendIcon}</span>
                            <span className="text-xs font-black tracking-tight">{isNegative ? '-' : '+'}{absVal.toFixed(1)}%</span>
                        </div>
                        <span className="text-[10px] font-bold text-on-surface-variant uppercase tracking-tight opacity-60">vs thn lalu</span>
                    </div>
                </div>
            );
        };

        const LegendItem = ({ color, label }) => (
            <div className="flex items-center gap-2">
                <div className={`w-2.5 h-1 rounded-full ${color}`}></div>
                <span className="text-[9px] font-bold text-on-surface-variant uppercase tracking-wider">{label}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
