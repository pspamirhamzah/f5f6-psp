<!DOCTYPE html>
<html lang="id" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard F5/F6 PSP</title>

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://f5f6-psp.pages.dev/">
    <meta property="og:title" content="Dashboard F5/F6 PSP">
    <meta property="og:description" content="Monitoring Penyaluran/Penebusan Subsidi">
    
    <meta property="og:image" content="https://f5f6-psp.pages.dev/thumbnail.png">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- React & ReactDOM (v18) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Prop Types (Wajib untuk Recharts) -->
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>

    <!-- Recharts -->
    <script crossorigin src="https://unpkg.com/recharts@2.8.0/umd/Recharts.js"></script>
    
    <!-- Babel (untuk JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        geminiBgDark: '#131314',
                        geminiCardDark: '#1e1f20',
                        geminiBorderDark: '#444746',
                        geminiTextDark: '#e3e3e3',
                        geminiTextMutedDark: '#c4c7c5',
                        geminiPrimaryDark: '#a8c7fa',
                        
                        geminiBgLight: '#f0f4f9',
                        geminiCardLight: '#ffffff',
                        geminiBorderLight: '#c7c7c7',
                        geminiTextLight: '#1f1f1f',
                        geminiTextMutedLight: '#444746',
                        geminiPrimaryLight: '#0b57d0',

                        // Warna Perusahaan
                        corpBlue: '#00529B',
                        corpYellow: '#F9AB00',
                    }
                }
            }
        }
    </script>

    <!-- PapaParse -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-scrollbar {
            scrollbar-width: thin;
            scrollbar-color: #c7c7c7 transparent; 
        }
        .dark .custom-scrollbar {
            scrollbar-color: #444746 transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
            margin: 0 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #c7c7c7;
            border-radius: 10px;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #444746;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #a0a0a0;
        }
        .dark .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #5f6368;
        }

        html { scroll-behavior: smooth; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-geminiBgLight text-geminiTextLight dark:bg-geminiBgDark dark:text-geminiTextDark transition-colors duration-300 antialiased selection:bg-geminiPrimaryLight/30 dark:selection:bg-geminiPrimaryDark/30">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { ComposedChart, Bar, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        const SPREADSHEET_ID = '1EAH4tsiT8YzneMtCxu_37VVJxKGJC_OCv6qWh3KK0go';

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('F5');
            const [dataF5, setDataF5] = useState([]);
            const [dataF6, setDataF6] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const fetchData = async () => {
                    setIsLoading(true);
                    setError(null);
                    try {
                        const fetchSheetAsCSV = (sheetName) => {
                            return new Promise((resolve, reject) => {
                                const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sheetName}`;
                                Papa.parse(url, {
                                    download: true,
                                    header: true,
                                    skipEmptyLines: true,
                                    complete: (results) => resolve(results.data),
                                    error: (err) => reject(new Error(`Gagal memuat data ${sheetName}.`))
                                });
                            });
                        };
                        const [f5Results, f6Results] = await Promise.all([
                            fetchSheetAsCSV('F5'),
                            fetchSheetAsCSV('F6')
                        ]);
                        setDataF5(f5Results || []);
                        setDataF6(f6Results || []);
                    } catch (err) {
                        setError(err.message);
                    } finally {
                        setIsLoading(false);
                    }
                };
                fetchData();
            }, []);

            useEffect(() => {
                lucide.createIcons();
                if (isDarkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }, [isDarkMode, isLoading, activeTab]);

            const parseNumber = (val) => {
                if (val === undefined || val === null || val === '-' || val === '') return 0;
                if (typeof val === 'number') return val;
                // Menggunakan titik sebagai pemisah ribuan dan koma sebagai desimal (Standard Indonesia)
                const cleaned = val.toString().trim().replace(/\./g, '').replace(/,/g, '.');
                const num = parseFloat(cleaned);
                return isNaN(num) ? 0 : num;
            };

            const formatNumber = (num) => {
                return new Intl.NumberFormat('id-ID', { 
                    minimumFractionDigits: 2, 
                    maximumFractionDigits: 2 
                }).format(num);
            };

            const formatYAxis = (value) => {
                if (value === 0) return '0';
                if (value >= 1000000) return (value / 1000000).toLocaleString('id-ID') + ' Jt';
                if (value >= 1000) return (value / 1000).toLocaleString('id-ID') + ' Rb';
                return value.toLocaleString('id-ID');
            };

            const currentData = activeTab === 'F5' ? dataF5 : dataF6;

            const [selectedTahun, setSelectedTahun] = useState('All');
            const [selectedProvinsi, setSelectedProvinsi] = useState('All');
            const [selectedKabupaten, setSelectedKabupaten] = useState('All');
            const [selectedProduk, setSelectedProduk] = useState('All');

            useEffect(() => {
                setSelectedKabupaten('All');
            }, [selectedProvinsi]);

            useEffect(() => {
                setSelectedProvinsi('All');
                setSelectedKabupaten('All');
                setSelectedProduk('All');
            }, [activeTab]);

            const filterOptions = useMemo(() => {
                if (!currentData || currentData.length === 0) return { tahun: [], provinsi: [], produk: [] };
                const tahunSet = new Set(), provinsiSet = new Set(), produkSet = new Set();
                currentData.forEach(row => {
                    if (row.Tahun) tahunSet.add(row.Tahun);
                    if (row.Provinsi) provinsiSet.add(row.Provinsi);
                    if (row.Produk) {
                        const p = row.Produk.toUpperCase();
                        if (p === 'UREA' || p === 'NPK') produkSet.add(row.Produk);
                    }
                });
                return {
                    tahun: Array.from(tahunSet).sort(),
                    provinsi: Array.from(provinsiSet).sort(),
                    produk: Array.from(produkSet).sort()
                };
            }, [currentData]);

            const kabupatenOptions = useMemo(() => {
                const kabSet = new Set();
                currentData.forEach(row => {
                    if (selectedProvinsi === 'All' || row.Provinsi === selectedProvinsi) {
                        if (row.Kabupaten) kabSet.add(row.Kabupaten);
                    }
                });
                return Array.from(kabSet).sort();
            }, [currentData, selectedProvinsi]);

            const filteredData = useMemo(() => {
                return currentData.filter(row => {
                    const matchTahun = selectedTahun === 'All' || String(row.Tahun) === String(selectedTahun);
                    const matchProvinsi = selectedProvinsi === 'All' || String(row.Provinsi) === String(selectedProvinsi);
                    const matchKabupaten = selectedKabupaten === 'All' || String(row.Kabupaten) === String(selectedKabupaten);
                    const matchProduk = selectedProduk === 'All' || String(row.Produk) === String(selectedProduk);
                    return matchTahun && matchProvinsi && matchKabupaten && matchProduk;
                });
            }, [currentData, selectedTahun, selectedProvinsi, selectedKabupaten, selectedProduk]);

            const getTimelineKey = (row) => {
                const prov = (row.Provinsi || 'UNKNOWN').toString().trim().toUpperCase();
                const kab = (row.Kabupaten || 'UNKNOWN').toString().trim().toUpperCase();
                const dist = (row['Kode Distributor'] || row['Nama Distributor'] || 'UNKNOWN').toString().trim().toUpperCase();
                const prod = (row.Produk || 'UNKNOWN').toString().trim().toUpperCase();
                return `${prov}_${kab}_${dist}_${prod}`;
            };

            const dashboardStats = useMemo(() => {
                if (!filteredData.length) return { totalStokAwal: 0, totalPenebusan: 0, totalPenyaluran: 0, totalStok: 0 };
                let penebusan = 0, penyaluran = 0;
                const timeline = {};
                filteredData.forEach(row => {
                    if(row.Status === 'Approve') {
                        penebusan += parseNumber(row.Penebusan);
                        penyaluran += parseNumber(row.Penyaluran);
                        const tKey = getTimelineKey(row), bulan = parseInt(row.Bulan) || 0;
                        if (!timeline[tKey]) timeline[tKey] = { minBulan: bulan, maxBulan: bulan, stokAwalByBulan: {}, stokAkhirByBulan: {} };
                        if (bulan < timeline[tKey].minBulan) timeline[tKey].minBulan = bulan;
                        if (bulan > timeline[tKey].maxBulan) timeline[tKey].maxBulan = bulan;
                        timeline[tKey].stokAwalByBulan[bulan] = (timeline[tKey].stokAwalByBulan[bulan] || 0) + parseNumber(row['Stok Awal']);
                        timeline[tKey].stokAkhirByBulan[bulan] = (timeline[tKey].stokAkhirByBulan[bulan] || 0) + parseNumber(row['Stok Akhir']);
                    }
                });
                let stokAwal = 0, stokAkhir = 0;
                Object.values(timeline).forEach(t => {
                    stokAwal += t.stokAwalByBulan[t.minBulan] || 0;
                    stokAkhir += t.stokAkhirByBulan[t.maxBulan] || 0;
                });
                return { totalStokAwal: stokAwal, totalPenebusan: penebusan, totalPenyaluran: penyaluran, totalStok: stokAkhir };
            }, [filteredData]);

            const chartDataBulanan = useMemo(() => {
                const bulanan = {};
                const namaBulanArr = ["JAN", "FEB", "MAR", "APR", "MEI", "JUN", "JUL", "AGU", "SEP", "OKT", "NOV", "DES"];
                filteredData.forEach(row => {
                    if(row.Status !== 'Approve') return;
                    const b = parseInt(row.Bulan);
                    if (b >= 1 && b <= 12) {
                        if (!bulanan[b]) bulanan[b] = { name: namaBulanArr[b - 1], indexBulan: b, Penebusan: 0, Penyaluran: 0 };
                        bulanan[b].Penebusan += parseNumber(row.Penebusan);
                        bulanan[b].Penyaluran += parseNumber(row.Penyaluran);
                    }
                });
                return Object.values(bulanan).sort((a, b) => a.indexBulan - b.indexBulan);
            }, [filteredData]);

            const topDistributor = useMemo(() => {
                const dist = {};
                filteredData.forEach(row => {
                    if(row.Status !== 'Approve') return;
                    const nama = row['Nama Distributor'];
                    if (nama) {
                        if (!dist[nama]) dist[nama] = { name: nama, value: 0 };
                        dist[nama].value += parseNumber(row.Penyaluran);
                    }
                });
                return Object.values(dist).sort((a, b) => b.value - a.value).slice(0, 5);
            }, [filteredData]);

            const tableData = useMemo(() => {
                const grouped = {};
                let groupByKey = '', labelHeader = '';
                if (selectedProvinsi === 'All') { groupByKey = 'Provinsi'; labelHeader = 'Provinsi'; }
                else if (selectedKabupaten === 'All') { groupByKey = 'Kabupaten'; labelHeader = 'Kabupaten'; }
                else { groupByKey = 'Nama Distributor'; labelHeader = 'Distributor'; }

                filteredData.forEach(row => {
                    if(row.Status !== 'Approve') return;
                    let groupName = row[groupByKey] || 'Tidak Diketahui';
                    if (!grouped[groupName]) grouped[groupName] = { name: groupName, Penebusan: 0, Penyaluran: 0, timeline: {} };
                    grouped[groupName].Penebusan += parseNumber(row.Penebusan);
                    grouped[groupName].Penyaluran += parseNumber(row.Penyaluran);
                    const tKey = getTimelineKey(row), b = parseInt(row.Bulan) || 0;
                    if (!grouped[groupName].timeline[tKey]) grouped[groupName].timeline[tKey] = { minBulan: b, maxBulan: b, stokAwalByBulan: {}, stokAkhirByBulan: {} };
                    const t = grouped[groupName].timeline[tKey];
                    if (b < t.minBulan) t.minBulan = b;
                    if (b > t.maxBulan) t.maxBulan = b;
                    t.stokAwalByBulan[b] = (t.stokAwalByBulan[b] || 0) + parseNumber(row['Stok Awal']);
                    t.stokAkhirByBulan[b] = (t.stokAkhirByBulan[b] || 0) + parseNumber(row['Stok Akhir']);
                });

                const final = Object.values(grouped).map(g => {
                    let sAwal = 0, sAkhir = 0;
                    Object.values(g.timeline).forEach(t => {
                        sAwal += t.stokAwalByBulan[t.minBulan] || 0;
                        sAkhir += t.stokAkhirByBulan[t.maxBulan] || 0;
                    });
                    return { name: g.name, StokAwal: sAwal, Penebusan: g.Penebusan, Penyaluran: g.Penyaluran, StokAkhir: sAkhir };
                });
                return { labelHeader, data: final.sort((a, b) => b.Penyaluran - a.Penyaluran) };
            }, [filteredData, selectedProvinsi, selectedKabupaten]);

            const maxPenyaluranTable = useMemo(() => {
                return tableData.data.length ? Math.max(...tableData.data.map(d => d.Penyaluran)) : 0;
            }, [tableData.data]);

            const LoadingView = () => (
                <div className="flex flex-col items-center justify-center min-h-[60vh] px-4">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-corpBlue mb-6"></div>
                    <h2 className="text-xl font-medium">Sabar Yee...</h2>
                    <p className="text-geminiTextMutedLight dark:text-geminiTextMutedDark mt-2 text-center text-sm max-w-sm">Iwak Sepat Iwak Gabus, Makin Cepat Makin Bagus!</p>
                </div>
            );

            const ErrorView = () => (
                <div className="flex flex-col items-center justify-center min-h-[60vh] px-4">
                    <div className="bg-red-100 dark:bg-red-900/30 p-4 rounded-full mb-4">
                        <i data-lucide="alert-octagon" className="w-10 h-10 text-red-600 dark:text-red-400"></i>
                    </div>
                    <h2 className="text-xl font-medium">Akses Data Gagal</h2>
                    <p className="text-red-600 mt-2 text-center text-sm">{error}</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col relative pb-6 sm:pb-10">
                    {/* Header */}
                    <header className="sticky top-0 z-50 bg-geminiBgLight/80 dark:bg-geminiBgDark/80 backdrop-blur-lg border-b border-geminiBorderLight dark:border-geminiBorderDark transition-colors duration-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="flex justify-between items-center h-14 sm:h-16">
                                <div className="flex items-center gap-3">
                                    <div className="w-8 h-8 rounded-full bg-corpBlue flex items-center justify-center text-white">
                                        <i data-lucide="sparkles" className="w-4 h-4"></i>
                                    </div>
                                    <h1 className="text-base sm:text-xl font-semibold tracking-tight">Dashboard F5/F6 PSP</h1>
                                </div>
                                <button 
                                    onClick={() => setIsDarkMode(!isDarkMode)}
                                    className="p-2 sm:p-2.5 rounded-full bg-geminiCardLight dark:bg-geminiCardDark border border-geminiBorderLight dark:border-geminiBorderDark transition-all"
                                >
                                    <i data-lucide={isDarkMode ? "sun" : "moon"} className="w-4 h-4 sm:w-5 sm:h-5"></i>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 mt-6 sm:mt-8">
                        
                        {/* Tab Navigation */}
                        <div className="flex items-center gap-2 sm:gap-3 mb-6 sm:mb-8 overflow-x-auto hide-scrollbar pb-2">
                            {['F5', 'F6'].map((tab) => (
                                <button
                                    key={tab}
                                    onClick={() => setActiveTab(tab)}
                                    className={`px-5 py-2 sm:px-6 sm:py-2.5 rounded-full font-medium text-sm transition-all whitespace-nowrap border ${
                                        activeTab === tab 
                                        ? 'bg-corpBlue text-white border-transparent shadow-sm' 
                                        : 'bg-transparent text-geminiTextMutedLight dark:text-geminiTextMutedDark border-geminiBorderLight dark:border-geminiBorderDark hover:bg-geminiCardLight dark:hover:bg-geminiCardDark'
                                    }`}
                                >
                                    Lampiran {tab}
                                </button>
                            ))}
                        </div>

                        {isLoading ? (
                            <LoadingView />
                        ) : error ? (
                            <ErrorView />
                        ) : (
                            <div className="space-y-6 sm:space-y-8 animate-fade-in">
                                
                                {/* Filter Section */}
                                <div className="bg-geminiCardLight dark:bg-geminiCardDark p-3 sm:p-5 rounded-2xl sm:rounded-3xl border border-geminiBorderLight dark:border-geminiBorderDark grid grid-cols-2 lg:grid-cols-4 gap-2 sm:gap-4 shadow-sm">
                                    {[
                                        { label: 'Tahun', value: selectedTahun, setter: setSelectedTahun, options: filterOptions.tahun },
                                        { label: 'Provinsi', value: selectedProvinsi, setter: setSelectedProvinsi, options: ['All', ...filterOptions.provinsi] },
                                        { label: 'Kabupaten', value: selectedKabupaten, setter: setSelectedKabupaten, options: ['All', ...kabupatenOptions] },
                                        { label: 'Produk', value: selectedProduk, setter: setSelectedProduk, options: ['All', ...filterOptions.produk] }
                                    ].map((f, i) => (
                                        <div key={i} className="flex flex-col overflow-hidden">
                                            <label className="text-[10px] sm:text-xs font-medium text-geminiTextMutedLight mb-1 sm:mb-1.5 ml-1 truncate">{f.label}</label>
                                            <select 
                                                value={f.value} 
                                                onChange={(e) => f.setter(e.target.value)}
                                                className="w-full bg-geminiBgLight dark:bg-[#131314] border border-geminiBorderLight dark:border-[#444746] text-geminiTextLight dark:text-geminiTextDark rounded-lg sm:rounded-xl px-2 sm:px-3.5 py-1.5 sm:py-2.5 text-xs sm:text-sm focus:outline-none focus:ring-2 focus:ring-corpBlue/30 transition-all truncate outline-none cursor-pointer"
                                            >
                                                {f.options.map((opt) => (
                                                    <option key={opt} value={opt}>{opt === 'All' ? `Semua ${f.label}` : opt}</option>
                                                ))}
                                            </select>
                                        </div>
                                    ))}
                                </div>

                                {/* KPI Cards */}
                                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 sm:gap-6">
                                    {[
                                        { label: 'Stok Awal', value: dashboardStats.totalStokAwal, icon: 'archive', color: 'text-indigo-600 dark:text-indigo-400', bg: 'bg-indigo-50 dark:bg-indigo-900/10' },
                                        { label: 'Penebusan', value: dashboardStats.totalPenebusan, icon: 'shopping-cart', color: 'text-corpBlue dark:text-geminiPrimaryDark', bg: 'bg-blue-50 dark:bg-blue-900/10' },
                                        { label: 'Penyaluran', value: dashboardStats.totalPenyaluran, icon: 'truck', color: 'text-corpYellow dark:text-corpYellow', bg: 'bg-amber-50 dark:bg-amber-900/10' },
                                        { label: 'Stok Akhir', value: dashboardStats.totalStok, icon: 'package', color: 'text-rose-600 dark:text-rose-400', bg: 'bg-rose-50 dark:bg-rose-900/10' }
                                    ].map((stat, idx) => (
                                        <div key={idx} className="bg-geminiCardLight dark:bg-geminiCardDark p-4 sm:p-6 rounded-3xl border border-geminiBorderLight dark:border-geminiBorderDark flex flex-col sm:flex-row items-start sm:items-center gap-4 shadow-sm">
                                            <div className={`p-3 rounded-2xl ${stat.bg} ${stat.color}`}>
                                                <i data-lucide={stat.icon} className="w-6 h-6"></i>
                                            </div>
                                            <div>
                                                <p className="text-[11px] sm:text-sm font-medium text-geminiTextMutedLight leading-tight">{stat.label}</p>
                                                <h3 className="text-base sm:text-2xl font-bold">
                                                    {formatNumber(stat.value)} 
                                                    <span className="text-[10px] sm:text-sm font-normal text-geminiTextMutedLight ml-1">Ton</span>
                                                </h3>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                {/* Charts Area */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-5 sm:gap-6 items-stretch">
                                    <div className="lg:col-span-2 bg-geminiCardLight dark:bg-geminiCardDark p-5 sm:p-6 rounded-2xl sm:rounded-3xl border border-geminiBorderLight dark:border-geminiBorderDark shadow-sm flex flex-col">
                                        <div className="flex justify-between items-center mb-6">
                                            <h3 className="text-base sm:text-lg font-semibold">Performa Bulanan</h3>
                                            <span className="text-xs font-medium px-2 py-1 bg-geminiBgLight dark:bg-[#131314] rounded-md border border-geminiBorderLight dark:border-[#444746]">Ton</span>
                                        </div>
                                        <div className="flex-1 w-full min-h-[340px] text-xs sm:text-sm">
                                            {chartDataBulanan.length > 0 ? (
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <ComposedChart data={chartDataBulanan} margin={{ top: 5, right: 5, left: -20, bottom: 0 }}>
                                                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={isDarkMode ? '#333537' : '#e0e0e0'} />
                                                        <XAxis dataKey="name" tick={{fill: isDarkMode ? '#c4c7c5' : '#444746'}} axisLine={false} tickLine={false} dy={10} />
                                                        <YAxis tick={{fill: isDarkMode ? '#c4c7c5' : '#444746'}} axisLine={false} tickLine={false} tickFormatter={formatYAxis} width={65} />
                                                        <Tooltip 
                                                            contentStyle={{ backgroundColor: isDarkMode ? '#1e1f20' : '#ffffff', borderColor: isDarkMode ? '#444746' : '#c7c7c7', color: isDarkMode ? '#e3e3e3' : '#1f1f1f', borderRadius: '12px', padding: '12px' }}
                                                            formatter={(value) => [`${formatNumber(value)} Ton`]}
                                                            cursor={{fill: isDarkMode ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.04)'}}
                                                        />
                                                        <Legend wrapperStyle={{ paddingTop: '20px' }} iconType="circle" />
                                                        <Bar dataKey="Penebusan" name="Penebusan" fill={isDarkMode ? '#a8c7fa' : '#0b57d0'} radius={[4, 4, 0, 0]} maxBarSize={40} />
                                                        {/* Menggunakan type="natural" untuk garis yang lebih halus/curvy */}
                                                        <Line type="natural" dataKey="Penyaluran" name="Penyaluran" stroke="#F9AB00" strokeWidth={3} dot={{ r: 4, fill: "#F9AB00", strokeWidth: 2 }} activeDot={{ r: 6 }} connectNulls={true} />
                                                    </ComposedChart>
                                                </ResponsiveContainer>
                                            ) : (
                                                <div className="h-full flex items-center justify-center opacity-50"><p>Data Kosong</p></div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Top 5 Distributor */}
                                    <div className="bg-geminiCardLight dark:bg-geminiCardDark p-5 sm:p-6 rounded-2xl sm:rounded-3xl border border-geminiBorderLight dark:border-geminiBorderDark shadow-sm flex flex-col">
                                        <h3 className="text-base sm:text-lg font-semibold mb-6">Top 5 Penyaluran</h3>
                                        <div className="flex-1 flex flex-col overflow-hidden">
                                            {topDistributor.length > 0 ? (
                                                <ul className="flex flex-col gap-3 h-full overflow-hidden">
                                                    {topDistributor.map((item, index) => (
                                                        <li key={index} className="flex-1 flex items-center justify-between p-3 bg-geminiBgLight dark:bg-[#131314] border border-transparent dark:border-[#2a2b2c] rounded-2xl hover:border-corpYellow/30 transition-all overflow-hidden">
                                                            <div className="flex items-center overflow-hidden flex-1 pr-2">
                                                                <div className={`flex-shrink-0 w-7 h-7 sm:w-8 sm:h-8 rounded-full flex items-center justify-center font-bold text-xs sm:text-sm mr-2 sm:mr-3 ${index === 0 ? 'bg-amber-100 text-amber-700' : 'bg-slate-100 text-slate-500'}`}>
                                                                    {index + 1}
                                                                </div>
                                                                <span className="font-medium text-xs sm:text-sm truncate">{item.name}</span>
                                                            </div>
                                                            <div className="text-right flex-shrink-0">
                                                                <span className="block font-semibold text-xs sm:text-sm">{formatNumber(item.value)}</span>
                                                                <span className="text-[10px] text-geminiTextMutedLight">Ton</span>
                                                            </div>
                                                        </li>
                                                    ))}
                                                </ul>
                                            ) : (
                                                <div className="h-full flex items-center justify-center opacity-50 text-sm"><p>Data distributor kosong</p></div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* Dynamic Table */}
                                <div className="bg-geminiCardLight dark:bg-geminiCardDark rounded-2xl sm:rounded-3xl border border-geminiBorderLight dark:border-geminiBorderDark shadow-sm overflow-hidden">
                                    <div className="p-5 sm:p-6 border-b border-geminiBorderLight dark:border-geminiBorderDark">
                                        <h3 className="text-base sm:text-lg font-semibold">Rincian Per {tableData.labelHeader}</h3>
                                        <p className="text-sm text-geminiTextMutedLight dark:text-geminiTextMutedDark mt-1">Performa distribusi berdasarkan volume penyaluran aktual.</p>
                                    </div>
                                    <div className="overflow-x-auto pb-3 custom-scrollbar">
                                        <table className="w-full min-w-[800px] text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-50 dark:bg-[#131314]/80 text-[10px] sm:text-xs font-semibold tracking-wider text-geminiTextMutedLight dark:text-geminiTextMutedDark uppercase border-b border-geminiBorderLight dark:border-geminiBorderDark">
                                                    <th className="py-4 px-4 sm:px-6 text-center w-16">Rank</th>
                                                    <th className="py-4 px-4 sm:px-6">{tableData.labelHeader}</th>
                                                    <th className="py-4 px-4 sm:px-6 text-right">Stok Awal</th>
                                                    <th className="py-4 px-4 sm:px-6 text-right">Penebusan</th>
                                                    <th className="py-4 px-4 sm:px-6 text-right">Penyaluran</th>
                                                    <th className="py-4 px-4 sm:px-6 text-right">Stok Akhir</th>
                                                </tr>
                                            </thead>
                                            <tbody className="text-sm divide-y divide-geminiBorderLight/60 dark:divide-geminiBorderDark/60">
                                                {tableData.data.length > 0 ? (
                                                    tableData.data.map((row, index) => {
                                                        const barWidth = maxPenyaluranTable > 0 ? (row.Penyaluran / maxPenyaluranTable) * 100 : 0;
                                                        let badgeClass = "bg-slate-100 text-slate-500 dark:bg-[#2a2b2c] dark:text-slate-400";
                                                        if (index === 0) badgeClass = "bg-yellow-100 text-yellow-700 dark:bg-yellow-900/40 dark:text-yellow-400 ring-1 ring-yellow-400/30";
                                                        else if (index === 1) badgeClass = "bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-300 ring-1 ring-slate-400/30";
                                                        else if (index === 2) badgeClass = "bg-orange-100 text-orange-800 dark:bg-orange-900/40 dark:text-orange-400 ring-1 ring-orange-400/30";

                                                        return (
                                                            <tr key={index} className="group hover:bg-slate-50 dark:hover:bg-white/[0.02] transition-colors duration-200">
                                                                <td className="py-3 px-4 sm:px-6">
                                                                    <div className={`w-6 h-6 sm:w-7 sm:h-7 rounded-full flex items-center justify-center font-bold text-xs mx-auto transition-colors ${badgeClass}`}>
                                                                        {index + 1}
                                                                    </div>
                                                                </td>
                                                                <td className="py-3 px-4 sm:px-6 font-medium text-geminiTextLight dark:text-geminiTextDark">{row.name}</td>
                                                                <td className="py-3 px-4 sm:px-6 text-right text-geminiTextMutedLight dark:text-geminiTextMutedDark">{formatNumber(row.StokAwal)}</td>
                                                                <td className="py-3 px-4 sm:px-6 text-right text-geminiTextMutedLight dark:text-geminiTextMutedDark">{formatNumber(row.Penebusan)}</td>
                                                                <td className="py-3 px-4 sm:px-6 text-right relative min-w-[150px]">
                                                                    <div className="absolute inset-y-1.5 right-4 sm:right-6 bg-amber-100 dark:bg-amber-900/30 rounded-md transition-all duration-700" style={{ width: `calc(${barWidth}% - 1.5rem)`, zIndex: 0 }}></div>
                                                                    <span className="relative z-10 text-corpYellow font-bold">{formatNumber(row.Penyaluran)}</span>
                                                                </td>
                                                                <td className="py-3 px-4 sm:px-6 text-right text-geminiTextMutedLight dark:text-geminiTextMutedDark font-medium">{formatNumber(row.StokAkhir)}</td>
                                                            </tr>
                                                        );
                                                    })
                                                ) : (
                                                    <tr>
                                                        <td colSpan="6" className="py-12 text-center text-geminiTextMutedLight dark:text-geminiTextMutedDark text-sm">
                                                            Data tidak ditemukan.
                                                        </td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                            </div>
                        )}
                    </main>

                    {/* Footer */}
                    <footer className="text-center mt-12 sm:mt-16 mb-4 text-[10px] text-geminiTextMutedLight dark:text-geminiTextMutedDark w-full px-4 opacity-70">
                        <p>Copyright &copy; 2026 Perusahaan - Adm Pemasaran & Penjualan</p>
                        <p className="mt-1">Design by 00.0034</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
