<!DOCTYPE html>
<html class="dark" lang="id">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>F5F6 PSP Dashboard</title>

    <!-- THUMBNAIL PREVIEW -->
    <meta property="og:title" content="F5F6 Dashboard">
    <meta property="og:description" content="PT Pupuk Sriwidjaja Palembang">
    <meta property="og:image" content="https://raw.githubusercontent.com/pspamirhamzah/f5f6-psp/main/public/thumbnail.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://github.com/pspamirhamzah/f5f6-psp">  
    
    <!-- Scripts & Frameworks -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-highest": "#23262e",
                        "surface-container-high": "#1d1f27",
                        "primary": "#85adff",
                        "on-background": "#e5e4ed",
                        "secondary": "#69f6b8",
                        "surface-dim": "#0c0e14",
                        "tertiary": "#ffb148",
                        "background": "#0c0e14",
                        "on-surface": "#e5e4ed",
                        "error-container": "#ff716c",
                        "label-dim": "#53555c"
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0c0e14; color: #e5e4ed; -webkit-tap-highlight-color: transparent; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-card {
            background: rgba(26, 29, 38, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .bezier-transition { transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite; }

        @keyframes slide-hint {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        .animate-slide-hint { animation: slide-hint 1.5s infinite ease-in-out; }
        
        @media (max-width: 768px) {
            .recharts-responsive-container { min-height: 250px; }
            table { font-size: 11px; }
        }
    </style>
</head>
<body class="bg-background overflow-x-hidden md:overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { 
            ComposedChart, Bar, Cell, Line, XAxis, YAxis, 
            CartesianGrid, Tooltip, ResponsiveContainer 
        } = window.Recharts;

        const SUPABASE_URL = 'https://fvbtqtleshwbrhdwkgfo.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2YnRxdGxlc2h3YnJoZHdrZ2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxMTI2NzcsImV4cCI6MjA5MTY4ODY3N30.dwd9WxTaEwYIAmTZJh7xT2qC3i0G4yU4lXy0OWHfaj8';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const KeyIcon = ({ label, active }) => (
            <div className={`w-8 h-8 rounded-lg border flex items-center justify-center text-[11px] font-black transition-all duration-300 flex-shrink-0 ${active ? 'bg-primary/20 border-primary text-primary shadow-[0_0_15px_rgba(133,173,255,0.3)]' : 'bg-white/5 border-white/10 text-[#aaaab3]'}`}>
                {label}
            </div>
        );

        const App = () => {
            const [activeTab, setActiveTab] = useState('F5');
            const [isCollapsed, setIsCollapsed] = useState(true);
            const [isMobileOpen, setIsMobileOpen] = useState(false);
            const [allData, setAllData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [loadProgress, setLoadProgress] = useState(0);
            const [activeIndex, setActiveIndex] = useState(null);
            
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);

            const [selectedTahun, setSelectedTahun] = useState('All');
            const [selectedProvinsi, setSelectedProvinsi] = useState('All');
            const [selectedKabupaten, setSelectedKabupaten] = useState('All');
            const [selectedProduk, setSelectedProduk] = useState('All');

            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                const fetchParallel = async () => {
                    setIsLoading(true);
                    setLoadProgress(5);
                    try {
                        const { count, error: countError } = await supabaseClient
                            .from('F5F6')
                            .select('*', { count: 'exact', head: true });

                        if (countError) throw countError;
                        if (!count) {
                            setIsLoading(false);
                            return;
                        }

                        const chunkSize = 1000;
                        const totalChunks = Math.ceil(count / chunkSize);
                        const promises = [];
                        const columns = 'tipe_dokumen,tahun,provinsi,kabupaten,kecamatan,distributor,produk,penebusan,penyaluran,stok_awal,stok_akhir,bulan';

                        let completedChunks = 0;
                        for (let i = 0; i < totalChunks; i++) {
                            const promise = supabaseClient
                                .from('F5F6')
                                .select(columns)
                                .range(i * chunkSize, (i * chunkSize) + (chunkSize - 1))
                                .then(result => {
                                    completedChunks++;
                                    const progress = Math.min(Math.round((completedChunks / totalChunks) * 100), 100);
                                    setLoadProgress(progress);
                                    return result.data;
                                });
                            promises.push(promise);
                        }

                        const results = await Promise.all(promises);
                        const combinedData = results.flat();
                        setAllData(combinedData);
                        
                        if (combinedData.length > 0) {
                            const years = [...new Set(combinedData.map(d => String(d.tahun)))].sort((a,b) => b-a);
                            setSelectedTahun(years[0]);
                        }
                        setTimeout(() => setIsLoading(false), 300);
                    } catch (err) {
                        console.error("Critical Fetch Error:", err);
                        setIsLoading(false);
                    }
                };
                fetchParallel();
            }, []);

            const parseNum = (val) => parseFloat(val) || 0;
            
            // Perubahan: Menambahkan minimumFractionDigits agar selalu muncul 2 desimal dengan koma
            const formatNumber = (num) => new Intl.NumberFormat('id-ID', { 
                minimumFractionDigits: 2, 
                maximumFractionDigits: 2 
            }).format(num);

            const filterOptions = useMemo(() => {
                const data = allData.filter(r => r.tipe_dokumen === activeTab);
                return {
                    tahun: [...new Set(data.map(d => String(d.tahun)))].sort((a, b) => b - a),
                    provinsi: [...new Set(data.map(d => d.provinsi))].sort(),
                    produk: [...new Set(data.map(d => d.produk))].sort()
                };
            }, [allData, activeTab]);

            const kabupatenOptions = useMemo(() => {
                const data = allData.filter(r => r.tipe_dokumen === activeTab);
                const filtered = selectedProvinsi === 'All' ? data : data.filter(r => r.provinsi === selectedProvinsi);
                return [...new Set(filtered.map(d => d.kabupaten))].sort();
            }, [allData, activeTab, selectedProvinsi]);

            const filteredData = useMemo(() => {
                return allData.filter(row => {
                    const matchType = row.tipe_dokumen === activeTab;
                    const matchYear = selectedTahun === 'All' || String(row.tahun) === selectedTahun;
                    const matchProv = selectedProvinsi === 'All' || row.provinsi === selectedProvinsi;
                    const matchKab = selectedKabupaten === 'All' || row.kabupaten === selectedKabupaten;
                    const matchProd = selectedProduk === 'All' || row.produk === selectedProduk;
                    return matchType && matchYear && matchProv && matchKab && matchProd;
                });
            }, [allData, activeTab, selectedTahun, selectedProvinsi, selectedKabupaten, selectedProduk]);

            const stats = useMemo(() => {
                const calculateMetrics = (data) => {
                    let sAwal = 0; let pnb = 0; let pnl = 0; let sAkhir = 0;
                    const entitas = {};
                    data.forEach(row => {
                        pnb += parseNum(row.penebusan);
                        pnl += parseNum(row.penyaluran);
                        const key = `${row.provinsi}_${row.kabupaten}_${row.kecamatan || ''}_${row.distributor}_${row.produk}`;
                        const b = parseInt(row.bulan) || 0;
                        if (!entitas[key]) {
                            entitas[key] = { minB: b, maxB: b, sA: parseNum(row.stok_awal), sE: parseNum(row.stok_akhir) };
                        } else {
                            if (b < entitas[key].minB) { entitas[key].minB = b; entitas[key].sA = parseNum(row.stok_awal); }
                            if (b > entitas[key].maxB) { entitas[key].maxB = b; entitas[key].sE = parseNum(row.stok_akhir); }
                        }
                    });
                    Object.values(entitas).forEach(e => { sAwal += e.sA; sAkhir += e.sE; });
                    return { sAwal, pnb, pnl, sAkhir };
                };

                const current = calculateMetrics(filteredData);
                const lastYearValue = parseInt(selectedTahun) - 1;
                const lastYearData = allData.filter(row => {
                    return row.tipe_dokumen === activeTab &&
                           String(row.tahun) === String(lastYearValue) &&
                           (selectedProvinsi === 'All' || row.provinsi === selectedProvinsi) &&
                           (selectedKabupaten === 'All' || row.kabupaten === selectedKabupaten) &&
                           (selectedProduk === 'All' || row.produk === selectedProduk);
                });
                const last = calculateMetrics(lastYearData);

                const getGrowth = (curr, prev) => {
                    if (prev === 0) return curr > 0 ? 100 : 0;
                    return ((curr - prev) / prev) * 100;
                };

                return {
                    ...current,
                    // Perubahan: Memformat rasio dengan locale ID agar desimal menggunakan koma
                    ratio: current.pnb > 0 ? new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(current.pnl/current.pnb) : "0,00",
                    yoy: {
                        sAwal: getGrowth(current.sAwal, last.sAwal),
                        pnb: getGrowth(current.pnb, last.pnb),
                        pnl: getGrowth(current.pnl, last.pnl),
                        sAkhir: getGrowth(current.sAkhir, last.sAkhir)
                    }
                };
            }, [filteredData, allData, selectedTahun, activeTab, selectedProvinsi, selectedKabupaten, selectedProduk]);

            const chartData = useMemo(() => {
                const months = {};
                filteredData.forEach(row => {
                    const b = parseInt(row.bulan);
                    if (b >= 1 && b <= 12) {
                        if (!months[b]) months[b] = { b, name: ["JAN", "FEB", "MAR", "APR", "MEI", "JUN", "JUL", "AGU", "SEP", "OKT", "NOV", "DES"][b-1], Penebusan: 0, Penyaluran: 0 };
                        months[b].Penebusan += parseNum(row.penebusan);
                        months[b].Penyaluran += parseNum(row.penyaluran);
                    }
                });
                return Object.values(months).sort((a,b) => a.b - b.b);
            }, [filteredData]);

            const currentBarGradient = useMemo(() => {
                if (selectedProduk === 'All') return 'url(#gradAll)';
                const p = selectedProduk.toUpperCase();
                if (p.includes('UREA')) return 'url(#gradUrea)';
                if (p.includes('NPK')) return 'url(#gradNpk)';
                return 'rgba(255,255,255,0.04)';
            }, [selectedProduk]);

            const drillDownGroup = useMemo(() => {
                let key = 'provinsi';
                let label = 'Provinsi';
                if (selectedProvinsi !== 'All') { key = 'kabupaten'; label = 'Kabupaten'; }
                if (selectedKabupaten !== 'All') { 
                    if (activeTab === 'F6') {
                        key = 'kecamatan'; 
                        label = 'Kecamatan'; 
                    } else {
                        key = 'distributor'; 
                        label = 'Distributor'; 
                    }
                }
                return { key, label };
            }, [selectedProvinsi, selectedKabupaten, activeTab]);

            const comparisonData = useMemo(() => {
                const groups = {};
                filteredData.forEach(row => {
                    const name = row[drillDownGroup.key] || 'Tidak Diketahui';
                    if (!groups[name]) groups[name] = { name, pnb: 0, pnl: 0 };
                    groups[name].pnb += parseNum(row.penebusan);
                    groups[name].pnl += parseNum(row.penyaluran);
                });
                return Object.values(groups).sort((a,b) => b.pnl - a.pnl).slice(0, 5);
            }, [filteredData, drillDownGroup]);

            const tableData = useMemo(() => {
                const groups = {};
                filteredData.forEach(row => {
                    const groupName = row[drillDownGroup.key] || 'Tidak Diketahui';
                    if (!groups[groupName]) {
                        groups[groupName] = { name: groupName, entities: {}, pnb: 0, pnl: 0 };
                    }
                    const g = groups[groupName];
                    g.pnb += parseNum(row.penebusan);
                    g.pnl += parseNum(row.penyaluran);
                    const entityKey = `${row.provinsi}_${row.kabupaten}_${row.kecamatan || ''}_${row.distributor}_${row.produk}`;
                    const b = parseInt(row.bulan) || 0;
                    if (!g.entities[entityKey]) {
                        g.entities[entityKey] = { minB: b, maxB: b, sA: parseNum(row.stok_awal), sE: parseNum(row.stok_akhir) };
                    } else {
                        if (b < g.entities[entityKey].minB) { g.entities[entityKey].minB = b; g.entities[entityKey].sA = parseNum(row.stok_awal); }
                        if (b > g.entities[entityKey].maxB) { g.entities[entityKey].maxB = b; g.entities[entityKey].sE = parseNum(row.stok_akhir); }
                    }
                });
                return Object.values(groups).map(g => {
                    let totalSA = 0; let totalSE = 0;
                    Object.values(g.entities).forEach(e => { totalSA += e.sA; totalSE += e.sE; });
                    return { name: g.name, sAwal: totalSA, pnb: g.pnb, pnl: g.pnl, sAkhir: totalSE };
                }).sort((a,b) => b.pnl - a.pnl);
            }, [filteredData, drillDownGroup]);

            const RankIndicator = ({ index }) => {
                if (index === 0) return <span className="material-symbols-outlined text-[#FFD700] text-lg md:text-xl select-none" style={{fontVariationSettings: "'FILL' 1"}}>workspace_premium</span>;
                if (index === 1) return <span className="material-symbols-outlined text-[#C0C0C0] text-lg md:text-xl select-none" style={{fontVariationSettings: "'FILL' 1"}}>workspace_premium</span>;
                if (index === 2) return <span className="material-symbols-outlined text-[#CD7F32] text-lg md:text-xl select-none" style={{fontVariationSettings: "'FILL' 1"}}>workspace_premium</span>;
                return <span className="text-[9px] md:text-[10px] font-bold text-label-dim w-5 text-center select-none">{index + 1}</span>;
            };

            return (
                <div className="flex h-screen overflow-hidden relative">
                    {/* LOADING OVERLAY */}
                    {isLoading && (
                        <div className="fixed inset-0 z-[100] bg-[#0c0e14] flex flex-col items-center justify-center">
                            <div className="w-10 h-10 rounded-2xl bg-gradient-to-br from-[#85adff] to-[#6e9fff] flex items-center justify-center shadow-2xl shadow-primary/10 mb-10 animate-pulse-soft">
                                <span className="material-symbols-outlined text-[#002c66] text-2xl" style={{fontVariationSettings: "'FILL' 1"}}>database</span>
                            </div>
                            <div className="text-center space-y-6 px-6">
                                <h1 className="text-sm font-normal text-on-background/80 leading-relaxed">Iwak Sepat Iwak Gabus <br />Makin Cepat Makin Bagus!</h1>
                                <div className="w-64 h-1 bg-white/5 rounded-full overflow-hidden mx-auto">
                                    <div className="h-full bg-primary transition-all duration-700 ease-in-out" style={{ width: `${loadProgress}%` }}></div>
                                </div>
                                <p className="text-[14px] text-primary/80">Sinkronisasi {loadProgress}%</p>
                            </div>
                        </div>
                    )}

                    {/* MOBILE OVERLAY */}
                    {isMobileOpen && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[55] lg:hidden" onClick={() => setIsMobileOpen(false)} />
                    )}

                    {/* ASIDE */}
                    <aside className={`fixed lg:static inset-y-0 left-0 z-[60] bg-[#11131a] flex flex-col py-6 px-4 shadow-2xl bezier-transition transform ${isMobileOpen ? 'translate-x-0 w-[260px]' : '-translate-x-full lg:translate-x-0'} ${isCollapsed ? 'lg:w-[80px]' : 'lg:w-[240px]'}`}>
                        <div className={`mb-10 flex items-center ${isCollapsed && !isMobileOpen ? 'justify-center' : 'px-2 gap-3'}`}>
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-[#85adff] to-[#6e9fff] flex-shrink-0 flex items-center justify-center shadow-lg shadow-primary/20">
                                <span className="material-symbols-outlined text-[#002c66]" style={{fontVariationSettings: "'FILL' 1"}}>insights</span>
                            </div>
                            {(!isCollapsed || isMobileOpen) && (
                                <div className="overflow-hidden whitespace-nowrap">
                                    <h1 className="text-xl font-black text-on-background tracking-tight leading-none">F5F6</h1>
                                    <p className="text-[10px] text-primary font-bold tracking-[0.2em] uppercase mt-1">DATABASE</p>
                                </div>
                            )}
                        </div>
                        <nav className="flex-1 space-y-2">
                            {['F5', 'F6'].map(tab => (
                                <button key={tab} onClick={() => {
                                    setActiveTab(tab); 
                                    setSelectedProvinsi('All'); 
                                    setSelectedKabupaten('All'); 
                                    setIsMobileOpen(false);
                                    if (allData.length > 0) {
                                        const tabData = allData.filter(d => d.tipe_dokumen === tab);
                                        if (tabData.length > 0) {
                                            const years = [...new Set(tabData.map(d => String(d.tahun)))].sort((a,b) => b-a);
                                            setSelectedTahun(years[0]);
                                        }
                                    }
                                }} className={`w-full flex items-center rounded-xl bezier-transition ${isCollapsed && !isMobileOpen ? 'justify-center p-3' : 'px-4 py-3 gap-3'} ${activeTab === tab ? 'bg-[#1d1f27] text-primary border-r-2 border-primary shadow-lg shadow-black/20' : 'text-[#aaaab3] hover:text-white hover:bg-white/5'}`}>
                                    <KeyIcon label={tab} active={activeTab === tab} />
                                    {(!isCollapsed || isMobileOpen) && <span className="font-semibold text-sm">Laporan {tab}</span>}
                                </button>
                            ))}
                        </nav>
                        <div className="mt-auto border-t border-white/5 pt-4">
                            <button onClick={() => setIsCollapsed(!isCollapsed)} className={`hidden lg:flex w-full items-center bg-white/5 rounded-xl text-[#aaaab3] hover:text-white transition-all ${isCollapsed ? 'justify-center p-3' : 'px-4 py-3 gap-3'}`}>
                                <span className="material-symbols-outlined">{isCollapsed ? 'last_page' : 'first_page'}</span>
                                {!isCollapsed && <span className="text-xs font-bold uppercase tracking-widest">Kecilkan</span>}
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 flex flex-col h-full w-full min-w-0">
                        <header className="h-16 flex items-center px-4 lg:px-8 border-b border-white/5 bg-background/50 backdrop-blur-md sticky top-0 z-40">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsMobileOpen(true)} className="lg:hidden p-2 rounded-lg bg-white/5 text-primary">
                                    <span className="material-symbols-outlined">menu</span>
                                </button>
                                <div className="flex items-center gap-2 text-[14px] md:text-xs font-medium text-on-surface-variant">
                                    <span className="hidden sm:inline">ANALYTIC</span>
                                    <span className="material-symbols-outlined text-sm hidden sm:inline">chevron_right</span>
                                    <span className="text-on-surface font-bold">DASHBOARD {activeTab}</span>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 lg:p-8 custom-scrollbar">
                            <section className="grid grid-cols-2 lg:grid-cols-4 gap-3 md:gap-4 mb-6 md:mb-8">
                                <FilterSelect label="Tahun" value={selectedTahun} onChange={setSelectedTahun} options={filterOptions.tahun} showAll />
                                <FilterSelect label="Provinsi" value={selectedProvinsi} onChange={setSelectedProvinsi} options={filterOptions.provinsi} showAll />
                                <FilterSelect label="Kabupaten" value={selectedKabupaten} onChange={setSelectedKabupaten} options={kabupatenOptions} showAll />
                                <FilterSelect label="Produk" value={selectedProduk} onChange={setSelectedProduk} options={filterOptions.produk} showAll />
                            </section>

                            <section className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-6 md:mb-8">
                                <KPICard label="Stok Awal" val={stats.sAwal} icon="inventory_2" iconColor="text-[#a8c7ff]" compareVal={stats.yoy.sAwal} />
                                <KPICard label="Penebusan" val={stats.pnb} icon="payments" iconColor="text-indigo-400" compareVal={stats.yoy.pnb} />
                                <KPICard label="Penyaluran" val={stats.pnl} icon="local_shipping" iconColor="text-secondary" compareVal={stats.yoy.pnl} />
                                <KPICard label="Stok Akhir" val={stats.sAkhir} icon="warehouse" iconColor="text-tertiary" compareVal={stats.yoy.sAkhir} />
                            </section>

                            <section className="grid grid-cols-12 gap-4 md:gap-8 mb-6 md:mb-8">
                                <div className="col-span-12 lg:col-span-8 glass-card p-4 md:p-8 rounded-2xl md:rounded-3xl flex flex-col min-h-[350px] md:min-h-[460px]">
                                    <div className="flex flex-col sm:flex-row justify-between items-start mb-6 md:mb-10 gap-4">
                                        <div>
                                            <h2 className="text-base md:text-lg font-bold text-on-surface uppercase tracking-tight">Tren {selectedTahun === 'All' ? 'Tahunan' : selectedTahun}</h2>
                                            <p className="text-[9px] md:text-[10px] text-label-dim uppercase font-bold tracking-widest">Analisis Perbandingan Data</p>
                                        </div>
                                        <div className="flex gap-4">
                                            <LegendItem color="bg-secondary" label="Penebusan" />
                                            <LegendItem color="bg-white/10" label="Penyaluran" />
                                        </div>
                                    </div>
                                    <div className="flex-1 w-full h-[250px] md:h-[320px]">
                                        {chartData.length > 0 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <ComposedChart data={chartData} onMouseMove={(s) => s.activeTooltipIndex !== undefined && setActiveIndex(s.activeTooltipIndex)} onMouseLeave={() => setActiveIndex(null)}>
                                                    <defs>
                                                        <linearGradient id="activeBarGrad" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="0%" stopColor="#fff" stopOpacity={0.3}/><stop offset="100%" stopColor="#fff" stopOpacity={0.1}/>
                                                        </linearGradient>
                                                        <linearGradient id="gradAll" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="0%" stopColor="#FFD700" stopOpacity={0.2}/><stop offset="100%" stopColor="#85adff" stopOpacity={0.1}/>
                                                        </linearGradient>
                                                        <linearGradient id="gradUrea" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="0%" stopColor="#FFD700" stopOpacity={0.25}/><stop offset="100%" stopColor="#FFD700" stopOpacity={0.05}/>
                                                        </linearGradient>
                                                        <linearGradient id="gradNpk" x1="0" y1="0" x2="0" y2="1">
                                                            <stop offset="0%" stopColor="#85adff" stopOpacity={0.25}/><stop offset="100%" stopColor="#85adff" stopOpacity={0.05}/>
                                                        </linearGradient>
                                                    </defs>
                                                    <CartesianGrid strokeDasharray="0" vertical={false} stroke="rgba(255,255,255,0.02)" />
                                                    <XAxis 
                                                        dataKey="name" 
                                                        axisLine={false} 
                                                        tickLine={false} 
                                                        tick={{fontSize: 9, fill: '#666', fontWeight: 700}} 
                                                        dy={10} 
                                                        interval={isMobile ? 1 : 0}
                                                    />
                                                    <YAxis hide />
                                                    <Tooltip cursor={false} content={<CustomTooltip />} />
                                                    <Bar dataKey="Penyaluran" radius={[6, 6, 0, 0]} maxBarSize={35}>
                                                        {chartData.map((e, i) => (
                                                            <Cell 
                                                                key={i} 
                                                                fill={i === activeIndex ? "url(#activeBarGrad)" : currentBarGradient} 
                                                                stroke={i === activeIndex ? "rgba(255,255,255,0.3)" : "transparent"} 
                                                                className="bezier-transition" 
                                                            />
                                                        ))}
                                                    </Bar>
                                                    <Line type="monotone" dataKey="Penebusan" stroke="#69f6b8" strokeWidth={5} dot={false} activeDot={{ r: 4, fill: '#fff', stroke: '#69f6b8', strokeWidth: 2 }} style={{ filter: 'drop-shadow(0px 4px 8px rgba(105, 246, 184, 0.4))' }} connectNulls={true} />
                                                </ComposedChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex flex-col items-center justify-center opacity-40">
                                                <span className="material-symbols-outlined text-4xl mb-2">bar_chart_off</span>
                                                <p className="text-[10px] font-bold uppercase tracking-widest">Tidak ada data</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="col-span-12 lg:col-span-4 glass-card p-4 md:p-8 rounded-2xl md:rounded-3xl flex flex-col min-h-[350px] md:min-h-[460px]">
                                    <div className="mb-6 md:mb-10">
                                        <h2 className="text-base md:text-lg font-bold text-on-surface uppercase tracking-tight">Ratio Efectivitas</h2>
                                        <p className="text-[9px] md:text-[10px] text-label-dim font-bold uppercase mt-1 tracking-widest">Berdasarkan Alokasi Terbesar</p>
                                    </div>
                                    <div className="flex-1 space-y-5 overflow-y-auto pr-2 custom-scrollbar">
                                        {comparisonData.map((d, i) => (
                                            <div key={i} className="py-2 border-b border-white/[0.03] last:border-0">
                                                <div className="flex justify-between items-center gap-4">
                                                    <div className="flex items-center gap-3 truncate">
                                                        <RankIndicator index={i} />
                                                        <span className="text-[11px] md:text-xs font-bold uppercase text-on-surface-variant truncate">{d.name}</span>
                                                    </div>
                                                    {/* Perubahan: Memformat persentase dengan 2 desimal dan koma */}
                                                    <span className="text-primary text-[10px] font-black shrink-0">
                                                        {new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format((d.pnl/d.pnb)*100 || 0)}%
                                                    </span>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                                        <div className="text-left">
                                            <p className="text-[8px] md:text-[9px] text-on-surface-variant font-bold uppercase tracking-widest">Ratio Rata-rata</p>
                                            <p className="text-xl md:text-2xl font-black text-primary">{stats.ratio}</p>
                                        </div>
                                        <div className={`px-4 py-2 rounded-xl text-[9px] md:text-[10px] font-black uppercase tracking-widest ${parseFloat(stats.ratio.replace(',', '.')) >= 0.8 ? 'bg-secondary/10 text-secondary' : 'bg-tertiary/10 text-tertiary'}`}>
                                            {parseFloat(stats.ratio.replace(',', '.')) >= 0.8 ? 'Optimal' : 'Monitoring'}
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="glass-card rounded-2xl md:rounded-3xl overflow-hidden mb-12">
                                <div className="p-4 md:p-8 flex flex-col sm:flex-row justify-between items-start sm:items-center border-b border-white/5 bg-white/[0.01] gap-4">
                                    <div className="flex flex-col gap-1">
                                        <h2 className="text-base md:text-lg font-bold text-on-surface uppercase tracking-tight">Rincian Penyaluran</h2>
                                        <p className="text-[9px] md:text-[10px] text-label-dim font-bold uppercase tracking-widest">Berdasarkan Alokasi Terbesar</p>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="lg:hidden flex items-center gap-1.5 px-3 py-1.5 rounded-full bg-primary/5 border border-primary/20 animate-pulse-soft">
                                            <span className="material-symbols-outlined text-primary text-xs animate-slide-hint">swipe_left</span>
                                            <span className="text-[9px] font-black text-primary uppercase tracking-tighter">Geser tabel</span>
                                        </div>
                                        <span className="text-[9px] md:text-[10px] font-bold text-primary uppercase bg-primary/10 px-3 py-1 rounded-full whitespace-nowrap">{tableData.length} {drillDownGroup.label}</span>
                                    </div>
                                </div>
                                <div className="overflow-x-auto hide-scrollbar custom-scrollbar">
                                    <table className="w-full text-left min-w-[700px]">
                                        <thead>
                                            <tr className="bg-white/[0.02] text-[9px] md:text-[10px] font-black uppercase tracking-widest text-on-surface-variant">
                                                <th className="py-4 px-6 w-16 text-center">Rank</th><th className="py-4 px-4">{drillDownGroup.label}</th><th className="py-4 px-6 text-right">Stok Awal</th><th className="py-4 px-6 text-right">Penebusan</th><th className="py-4 px-6 text-right">Penyaluran</th><th className="py-4 px-8 text-right">Stok Akhir</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-[11px] md:text-xs divide-y divide-white/[0.03]">
                                            {tableData.map((row, i) => (
                                                <tr key={i} className="hover:bg-white/[0.02] transition-colors group">
                                                    <td className="py-3 px-6 text-center"><div className="flex justify-center items-center"><RankIndicator index={i} /></div></td>
                                                    <td className="py-3 px-4"><p className="font-bold uppercase tracking-tight">{row.name}</p>{drillDownGroup.key === 'kabupaten' && <p className="text-[8px] text-on-surface-variant uppercase">{selectedProvinsi}</p>}</td>
                                                    <td className="py-3 px-6 text-right text-on-surface/50">{formatNumber(row.sAwal)}</td><td className="py-3 px-6 text-right text-on-surface/50">{formatNumber(row.pnb)}</td><td className="py-3 px-6 text-right text-primary font-black">{formatNumber(row.pnl)}</td><td className="py-3 px-8 text-right font-black opacity-80">{formatNumber(row.sAkhir)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </section>
                            <footer className="mt-8 pb-12 text-center space-y-1 select-none"><p className="text-[10px] text-label-dim tracking-tight">Copyright © 2026 - Adm Pemasaran & Penjualan</p><p className="text-[10px] text-label-dim tracking-tight">Design by 00.0034</p></footer>
                        </div>
                    </main>
                </div>
            );
        };

        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                return (
                    <div className="glass-card px-3 py-2 rounded-xl border border-primary/20 shadow-2xl">
                        <p className="text-[11px] md:text-[13px] font-black text-primary uppercase tracking-widest mb-1">{label}</p>
                        <div className="space-y-1">
                            {payload.map((p, idx) => (
                                <div key={idx} className="flex justify-between gap-6 items-center">
                                    <span className="text-[8px] font-bold text-on-surface-variant uppercase">{p.name}</span>
                                    {/* Perubahan: Tooltip menggunakan format 2 desimal dan koma */}
                                    <span className="text-[10px] font-black text-on-surface">
                                        {new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(p.value)}
                                    </span>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            }
            return null;
        };

        const FilterSelect = ({ label, value, onChange, options, showAll }) => (
            <div className="space-y-1">
                <label className="text-[9px] font-black text-label-dim uppercase tracking-widest px-1">{label}</label>
                <div className="relative group">
                    <select value={value} onChange={e => onChange(e.target.value)} className="w-full bg-surface-container-high border-none rounded-xl text-[11px] py-2.5 px-3 appearance-none focus:ring-1 focus:ring-primary/40 text-on-surface transition-all">
                        {showAll && <option value="All">SEMUA {label.toUpperCase()}</option>}
                        {options.map((opt, i) => <option key={i} value={typeof opt === 'object' ? opt.val : opt}>{String(typeof opt === 'object' ? opt.label : opt).toUpperCase()}</option>)}
                    </select>
                    <span className="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant text-base">expand_more</span>
                </div>
            </div>
        );

        const KPICard = ({ label, val, icon, iconColor, compareVal }) => {
            const isNegative = compareVal < 0;
            const absVal = Math.abs(compareVal);
            const trendColor = isNegative ? 'text-error-container' : 'text-secondary';
            const trendIcon = isNegative ? 'trending_down' : 'trending_up';
            
            return (
                <div className="glass-card p-4 md:p-6 rounded-2xl md:rounded-3xl relative flex flex-col group hover:scale-[1.01] transition-transform shadow-xl overflow-hidden">
                    <div className="absolute -top-4 -right-4 opacity-[0.03] pointer-events-none select-none">
                         <span className={`material-symbols-outlined text-[100px] md:text-[120px] ${iconColor}`}>{icon}</span>
                    </div>

                    <div className="flex items-center gap-3 mb-4 md:mb-6 relative z-10">
                        <span className={`material-symbols-outlined text-3xl md:text-4xl ${iconColor}`}>{icon}</span>
                        <p className={`text-base md:text-lg font-bold uppercase tracking-tight ${iconColor}`}>{label}</p>
                    </div>
                    
                    <div className="mb-4 md:mb-6 relative z-10 flex items-baseline gap-2 overflow-hidden">
                        <h3 className="text-xl md:text-3xl font-black tracking-tighter text-on-background whitespace-nowrap">
                            {/* Perubahan: Menggunakan formatNumber yang sudah mendukung 2 desimal dengan koma */}
                            {new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(val)}
                        </h3>
                        <span className="text-xl md:text-3xl font-light text-label-dim uppercase tracking-tighter lg:scale-x-90 inline-block origin-left whitespace-nowrap">TON</span>
                    </div>

                    <div className="mt-auto flex items-center gap-2 relative z-10">
                        <div className={`flex items-center gap-1 px-1.5 py-0.5 rounded-lg ${isNegative ? 'bg-error-container/10' : 'bg-secondary/10'} ${trendColor}`}>
                            <span className="material-symbols-outlined text-xs md:text-sm font-bold">{trendIcon}</span>
                            {/* Perubahan: Growth menggunakan format 2 desimal dengan koma */}
                            <span className="text-[10px] font-black">{isNegative ? '-' : '+'}{new Intl.NumberFormat('id-ID', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(absVal)}%</span>
                        </div>
                        <span className="text-[8px] md:text-[9px] font-medium text-on-surface-variant uppercase opacity-50 whitespace-nowrap">vs thn lalu</span>
                    </div>
                </div>
            );
        };

        const LegendItem = ({ color, label }) => (
            <div className="flex items-center gap-2">
                <div className={`w-2 h-0.5 md:w-2.5 md:h-1 rounded-full ${color}`}></div>
                <span className="text-[8px] md:text-[9px] font-bold text-on-surface-variant uppercase tracking-wider">{label}</span>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
